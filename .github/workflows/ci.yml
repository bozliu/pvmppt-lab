name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest
      - name: Run release check
        run: pvmppt-lab release-check
      - name: Run smoke demo
        run: |
          pvmppt-lab run-static --output runs/static-smoke --points 48
          pvmppt-lab run-mppt --output runs/mppt-smoke --total-time-s 0.03
